<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Call Center Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>
    <div class="dashboard-container">
        <header>
            <h1><i class="fas fa-headset"></i> AI Call Center Assistant</h1>
            <div class="status-badge" id="recording-status">Inactive</div>
        </header>

        <div class="main-grid">
            <!-- Left Column: Voice Control & Transcription -->
            <div class="card interaction-card">
                <div class="card-header">
                    <h2><i class="fas fa-microphone"></i> Voice Interaction</h2>
                </div>
                <div class="card-body">
                    <button id="mic-btn" class="mic-button">
                        <i class="fas fa-microphone"></i>
                        <span>Start Listening</span>
                    </button>

                    <div class="transcription-box">
                        <h3>Live Transcription</h3>
                        <p id="transcription-text" class="placeholder">Awaiting speech...</p>
                    </div>
                </div>
            </div>

            <!-- Right Column: AI Insights & Response -->
            <div class="card insights-card">
                <div class="card-header">
                    <h2><i class="fas fa-brain"></i> AI Intelligence</h2>
                </div>
                <div class="card-body">
                    <div class="sentiment-box">
                        <h3>Sentiment Analysis</h3>
                        <div id="sentiment-indicator" class="sentiment-chip neutral">
                            <i class="fas fa-minus"></i> Neutral
                        </div>
                    </div>

                    <div class="suggestions-box">
                        <h3>Actionable Suggestions</h3>
                        <div id="suggestions-container" class="chip-container">
                            <span class="placeholder">No suggestions yet.</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bottom Span: AI Output -->
            <div class="card response-card full-width">
                <div class="card-header">
                    <h2><i class="fas fa-robot"></i> Assistant Response</h2>
                </div>
                <div class="card-body">
                    <p id="ai-response-text" class="placeholder">AI response will appear here...</p>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
